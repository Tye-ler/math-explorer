
<style>
#mw{display:flex;flex-direction:column;align-items:center;gap:9px;padding:.8rem 0}
.row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%}
.cg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 8px}
canvas{border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);cursor:crosshair;touch-action:none;display:block}
button{font-size:12px;padding:4px 11px}
button.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.sw{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .1s,border-color .1s}
.sw:hover{transform:scale(1.25)}
.sw.sel{border-color:var(--color-text-primary)}
select{font-size:12px;padding:2px 5px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
#liss-opts{display:none}
</style>

<div id="mw">
<h2 class="sr-only">Mandala generator — draw symmetrical patterns with rainbow, orbit, Lissajous, and harmonograph modes</h2>

<div class="row">
  <div class="cg"><label for="seg">Sym</label><input type="range" id="seg" min="2" max="36" value="12" style="width:65px"><span id="seg-v" style="font-weight:500;min-width:20px">12</span></div>
  <div class="cg"><label for="sz">Size</label><input type="range" id="sz" min="1" max="28" value="3" style="width:60px"><span id="sz-v" style="font-weight:500;min-width:18px">3</span></div>
  <div class="cg"><label for="op">Fade</label><input type="range" id="op" min="5" max="100" value="100" style="width:60px"><span id="op-v" style="font-weight:500;min-width:26px">100%</span></div>
  <div class="cg"><label for="spd">Speed</label><input type="range" id="spd" min="1" max="10" value="5" style="width:60px"><span id="spd-v" style="font-weight:500;min-width:18px">5</span></div>
</div>

<div class="row">
  <div class="cg" id="col-wrap"><label for="col">Color</label><input type="color" id="col" value="#c084fc" style="width:26px;height:22px;padding:1px;border-radius:3px;cursor:pointer"></div>
  <div class="cg"><span>BG</span><input type="color" id="bgcol" value="#08081a" style="width:26px;height:22px;padding:1px;border-radius:3px;cursor:pointer"></div>
  <div class="cg" id="swatch-row"></div>
  <div class="cg"><label><input type="checkbox" id="mir" checked style="margin-right:3px">Reflect</label></div>
  <div class="cg"><label><input type="checkbox" id="glo" style="margin-right:3px">Glow</label></div>
  <div class="cg"><label><input type="checkbox" id="dot" style="margin-right:3px">Dots</label></div>
</div>

<div class="row">
  <button id="rbBtn">Rainbow</button>
  <button id="erBtn">Eraser</button>
  <button id="orBtn">Orbit</button>
  <button id="spBtn">Spiral</button>
  <button id="puBtn">Pulse</button>
  <button id="liBtn">Lissajous</button>
  <button id="haBtn">Harmonograph</button>
  <button id="unBtn">Undo</button>
  <button id="clBtn">Clear</button>
  <button id="svBtn">Save ↗</button>
</div>

<div class="row" id="liss-opts">
  <div class="cg">
    <label for="lrat">Ratio</label>
    <select id="lrat">
      <option value="1,2">1:2</option><option value="1,3">1:3</option>
      <option value="2,3" selected>2:3</option><option value="3,4">3:4</option>
      <option value="3,5">3:5</option><option value="4,5">4:5</option>
      <option value="5,6">5:6</option><option value="5,8">5:8</option>
    </select>
  </div>
  <div class="cg">
    <label for="lph">Phase</label>
    <input type="range" id="lph" min="0" max="628" value="100" style="width:70px">
    <span id="lph-v" style="font-weight:500;min-width:26px">1.00</span>
  </div>
</div>

<canvas id="c" width="560" height="560"></canvas>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;

let drawing = false, lx = null, ly = null;
let hue = 0, rainbow = false, eraser = false, dotMode = false, glowOn = false;
let anim = null, mode = null;
let undoStack = [];
let bgColor = '#08081a';
canvas.style.background = bgColor;

// Swatches
const SWATCHES = ['#c084fc','#60a5fa','#34d399','#fbbf24','#f87171','#fb923c','#f472b6','#e2e8f0','#ffffff'];
const swRow = document.getElementById('swatch-row');
SWATCHES.forEach(hex => {
  const s = document.createElement('div');
  s.className = 'sw'; s.style.background = hex; s.title = hex;
  s.onclick = () => {
    document.querySelectorAll('.sw').forEach(x => x.classList.remove('sel'));
    s.classList.add('sel');
    document.getElementById('col').value = hex;
    if (rainbow) toggleRainbow();
  };
  swRow.appendChild(s);
});

// Slider bindings
function bind(id, outId, fmt) {
  const el = document.getElementById(id), out = document.getElementById(outId);
  el.addEventListener('input', () => out.textContent = fmt ? fmt(el.value) : el.value);
}
bind('seg','seg-v'); bind('sz','sz-v'); bind('spd','spd-v');
bind('op','op-v', v => v+'%');
document.getElementById('lph').addEventListener('input', function() {
  document.getElementById('lph-v').textContent = (this.value/100).toFixed(2);
});
document.getElementById('bgcol').addEventListener('input', function() {
  bgColor = this.value; canvas.style.background = bgColor;
});
document.getElementById('glo').addEventListener('change', e => glowOn = e.target.checked);
document.getElementById('dot').addEventListener('change', e => dotMode = e.target.checked);

// Undo
function saveUndo() {
  undoStack.push(ctx.getImageData(0,0,W,H));
  if (undoStack.length > 20) undoStack.shift();
}
function undo() { if (undoStack.length) ctx.putImageData(undoStack.pop(), 0, 0); }
document.getElementById('unBtn').onclick = undo;
document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); } });

// Color
function getColor() {
  if (eraser) return null;
  const op = parseInt(document.getElementById('op').value)/100;
  if (rainbow) { hue = (hue+2)%360; return `hsla(${hue},100%,65%,${op})`; }
  const h = document.getElementById('col').value;
  return `rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${op})`;
}

function applyCtx(color, lineWidth) {
  if (eraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = lineWidth * 4;
    ctx.shadowBlur = 0;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.shadowBlur = glowOn ? 14 : 0;
    ctx.shadowColor = glowOn ? color : 'transparent';
  }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}

function sym(x1,y1,x2,y2,color) {
  const segs = parseInt(document.getElementById('seg').value);
  const refl = document.getElementById('mir').checked;
  const sz = parseInt(document.getElementById('sz').value);
  const ang = (Math.PI*2)/segs;
  const c = color || getColor();
  applyCtx(c, sz);
  const dx1=x1-cx, dy1=y1-cy, dx2=x2-cx, dy2=y2-cy;
  for (let i=0; i<segs; i++) {
    const a=ang*i, co=Math.cos(a), si=Math.sin(a);
    if (dotMode && !eraser) {
      ctx.beginPath(); ctx.arc(co*dx2-si*dy2+cx, si*dx2+co*dy2+cy, sz, 0, Math.PI*2); ctx.fill();
      if (refl) { ctx.beginPath(); ctx.arc(co*dx2+si*dy2+cx, si*dx2-co*dy2+cy, sz, 0, Math.PI*2); ctx.fill(); }
    } else {
      ctx.beginPath(); ctx.moveTo(co*dx1-si*dy1+cx, si*dx1+co*dy1+cy); ctx.lineTo(co*dx2-si*dy2+cx, si*dx2+co*dy2+cy); ctx.stroke();
      if (refl) { ctx.beginPath(); ctx.moveTo(co*dx1+si*dy1+cx, si*dx1-co*dy1+cy); ctx.lineTo(co*dx2+si*dy2+cx, si*dx2-co*dy2+cy); ctx.stroke(); }
    }
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.shadowBlur = 0;
}

// Pointer
function pos(e) {
  const r=canvas.getBoundingClientRect(), cl=e.touches?e.touches[0]:e;
  return [(cl.clientX-r.left)*W/r.width, (cl.clientY-r.top)*H/r.height];
}
canvas.addEventListener('mousedown', e => { drawing=true; saveUndo(); const[x,y]=pos(e); lx=x;ly=y; if(dotMode) sym(x,y,x,y); });
canvas.addEventListener('mousemove', e => { if(!drawing)return; const[x,y]=pos(e); sym(lx,ly,x,y); lx=x;ly=y; });
canvas.addEventListener('mouseup',   e => { drawing=false; lx=ly=null; });
canvas.addEventListener('mouseleave',e => { drawing=false; lx=ly=null; });
canvas.addEventListener('touchstart', e=>{e.preventDefault();drawing=true;saveUndo();const[x,y]=pos(e);lx=x;ly=y;if(dotMode)sym(x,y,x,y);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();if(!drawing)return;const[x,y]=pos(e);sym(lx,ly,x,y);lx=x;ly=y;},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();drawing=false;lx=ly=null;});

// Mode system
const modeIds = ['or','sp','pu','li','ha'];
function stopAll() {
  if (anim) { cancelAnimationFrame(anim); anim=null; }
  mode=null;
  modeIds.forEach(id => document.getElementById(id+'Btn').classList.remove('on'));
  document.getElementById('liss-opts').style.display='none';
}
function startMode(name, fn) {
  if (mode===name){stopAll();return;}
  stopAll(); mode=name;
  document.getElementById(name+'Btn').classList.add('on');
  if (name==='li') document.getElementById('liss-opts').style.display='flex';
  saveUndo(); fn();
}
function sp() { return parseFloat(document.getElementById('spd').value)/5; }

// Rainbow toggle
function toggleRainbow() {
  rainbow=!rainbow;
  document.getElementById('rbBtn').classList.toggle('on',rainbow);
  document.getElementById('col-wrap').style.opacity=rainbow?'0.4':'1';
}
document.getElementById('rbBtn').onclick = toggleRainbow;

// Eraser toggle
document.getElementById('erBtn').onclick = function() {
  eraser=!eraser;
  this.classList.toggle('on',eraser);
  canvas.style.cursor=eraser?'cell':'crosshair';
};

// Orbit
document.getElementById('orBtn').onclick = () => startMode('or', () => {
  const R=[55,100,150,195], base=[0.018,-0.013,0.009,-0.006], ang=[0,1,2.5,4];
  let prev=null;
  function f() {
    const s=sp(), nxt=[];
    for(let i=0;i<R.length;i++){
      ang[i]+=base[i]*s;
      const x=cx+Math.cos(ang[i])*R[i], y=cy+Math.sin(ang[i])*R[i];
      if(prev) sym(prev[i][0],prev[i][1],x,y);
      nxt.push([x,y]);
    }
    prev=nxt; anim=requestAnimationFrame(f);
  }
  f();
});

// Spiral
document.getElementById('spBtn').onclick = () => startMode('sp', () => {
  let a=0,r=0,grow=true,px=null,py=null;
  function f() {
    const s=sp(); a+=0.06*s;
    if(grow){r+=0.9*s;if(r>228)grow=false;}else{r-=0.9*s;if(r<2)grow=true;}
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    if(px!==null) sym(px,py,x,y); px=x;py=y; anim=requestAnimationFrame(f);
  }
  f();
});

// Pulse
document.getElementById('puBtn').onclick = () => startMode('pu', () => {
  let t=0,px=null,py=null;
  function f() {
    const s=sp(); t+=0.04*s;
    const r=80+Math.sin(t*3)*60+Math.sin(t*7)*30, w=t+Math.sin(t*2)*0.3;
    const x=cx+Math.cos(w)*r, y=cy+Math.sin(w)*r;
    if(px!==null) sym(px,py,x,y); px=x;py=y; anim=requestAnimationFrame(f);
  }
  f();
});

// Lissajous
document.getElementById('liBtn').onclick = () => startMode('li', () => {
  let t=0,px=null,py=null;
  function f() {
    const s=sp(); t+=0.015*s;
    const rat=document.getElementById('lrat').value.split(',').map(Number);
    const ph=parseInt(document.getElementById('lph').value)/100;
    const x=cx+220*Math.sin(rat[0]*t+ph), y=cy+220*Math.sin(rat[1]*t);
    if(px!==null) sym(px,py,x,y); px=x;py=y; anim=requestAnimationFrame(f);
  }
  f();
});

// Harmonograph — dual-pendulum physical simulation
document.getElementById('haBtn').onclick = () => startMode('ha', () => {
  let t=0,px=null,py=null;
  // Two slightly detuned pendulums per axis, very gentle damping
  const f1=2.010,f2=3.001,f3=1.999,f4=2.998;
  const d=0.00012;
  function f() {
    const s=sp();
    for(let step=0;step<4;step++){
      t+=0.018*s;
      const decay=Math.exp(-d*t);
      const x=cx+decay*(165*Math.sin(f1*t+0.5)+65*Math.sin(f2*t+1.2));
      const y=cy+decay*(165*Math.sin(f3*t+0.2)+65*Math.sin(f4*t));
      if(px!==null) sym(px,py,x,y); px=x;py=y;
    }
    if(Math.exp(-d*t)<0.04) { t=0; px=null; py=null; }
    anim=requestAnimationFrame(f);
  }
  f();
});

// Clear & Save
document.getElementById('clBtn').onclick = () => { stopAll(); saveUndo(); ctx.clearRect(0,0,W,H); };
document.getElementById('svBtn').onclick = () => {
  const tmp=document.createElement('canvas'); tmp.width=W; tmp.height=H;
  const tc=tmp.getContext('2d'); tc.fillStyle=bgColor; tc.fillRect(0,0,W,H); tc.drawImage(canvas,0,0);
  const a=document.createElement('a'); a.download='mandala.png'; a.href=tmp.toDataURL(); a.click();
};
</script>
