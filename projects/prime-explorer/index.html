<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Explorer</title>
  <style>
    :root {
      --ta-site-header-height: 3.25rem;
      --ta-site-header-height-stacked: 5.2rem;
      --max-width: 960px;
      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1.25rem;
      --space-4: 1.75rem;
      --accent: #86e1ff;
      --prime-color: #7ee787;
      --neutral-point: #9ca3af;
    }

    :root,
    :root[data-theme="dark"] {
      --bg-start: #171717;
      --bg-end: #1d1d1d;
      --text: #d7d7d7;
      --muted: #969696;
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.16);
      --control-text: #aaaaaa;
      --control-text-hover: #e0e0e0;
      --menu-bg: #262626;

      --viz-bg: #1f1f1f;
      --viz-frame: rgba(255,255,255,0.14);
      --viz-grid: rgba(255,255,255,0.08);
      --viz-axis: rgba(255,255,255,0.24);
      --viz-text: #cdcdcd;
      --viz-primary: #5f8fe8;
      --viz-secondary: #7f69ba;
      --viz-highlight: #e1e1e1;
      --viz-point: #5f8fe8;
      --spiral-guide: rgba(95, 143, 232, 0.35);
    }

    :root[data-theme="light"] {
      --bg-start: #f7f7f5;
      --bg-end: #efefec;
      --text: #222222;
      --muted: #666666;
      --line: rgba(0,0,0,0.08);
      --line-strong: rgba(0,0,0,0.14);
      --control-text: #4f4f4f;
      --control-text-hover: #1f1f1f;
      --menu-bg: #e8e8e4;
      --accent: #4a7bd1;

      --viz-bg: #ffffff;
      --viz-frame: rgba(0,0,0,0.10);
      --viz-grid: rgba(0,0,0,0.05);
      --viz-axis: rgba(0,0,0,0.18);
      --viz-text: #2a2a2a;
      --viz-primary: #2f6fed;
      --viz-secondary: #8c5bd6;
      --viz-highlight: #111111;
      --viz-point: #2f6fed;
      --neutral-point: #6b7280;
      --spiral-guide: rgba(47, 111, 237, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text);
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .ta-site-header,
    .ta-site-header * {
      box-sizing: border-box;
    }

    .ta-site-header {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      position: sticky;
      top: 0;
      z-index: 100;
      display: block;
      padding: 0;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(10, 15, 26, 0.58);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .ta-site-header {
        background: rgba(10, 15, 26, 0.92);
      }
    }

    .ta-site-nav {
      width: min(100% - 2rem, 1120px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
    }

    .ta-site-brand {
      color: #eef2f7;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1rem;
      line-height: 1.2;
    }

    .ta-site-links {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      flex-wrap: wrap;
    }

    .ta-site-link {
      color: #9aa7ba;
      text-decoration: none;
      line-height: 1.2;
      transition: color 0.25s ease, opacity 0.25s ease;
    }

    .ta-site-link:hover,
    .ta-site-link:focus-visible,
    .ta-site-link[aria-current="page"] {
      color: #eef2f7;
    }

    .ta-site-brand:focus-visible,
    .ta-site-link:focus-visible,
    .control input:not([type="checkbox"]):not([type="radio"]):focus-visible,
    .control select:focus-visible,
    .control textarea:focus-visible,
    button:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    .ta-site-project-shell {
      min-height: calc(100vh - var(--ta-site-header-height));
    }

    .page-shell {
      width: min(100% - 2rem, var(--max-width));
      margin: 0 auto;
      padding: var(--space-4) 0;
      display: grid;
      gap: var(--space-4);
    }

    .page-topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: var(--space-2);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 84px;
      text-align: center;
    }

    .hero {
      display: grid;
      gap: 0.45rem;
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--line);
    }

    .hero h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 400;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 68ch;
      font-size: 12px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 280px) minmax(0, 1fr);
      gap: var(--space-4);
      align-items: start;
    }

    .section {
      display: grid;
      gap: var(--space-2);
    }

    .section h2 {
      margin: 0;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
    }

    .surface {
      border: 1px solid var(--line);
      padding: var(--space-2);
    }

    .control-stack {
      display: grid;
      gap: var(--space-2);
    }

    .control {
      display: grid;
      gap: 0.3rem;
    }

    .control label {
      font-size: 12px;
      color: var(--muted);
    }

    .factor-row {
      display: grid;
      gap: 0.35rem;
    }

    .factor-input-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.5rem;
      align-items: center;
    }

    .factor-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--line);
      color: var(--muted);
      white-space: nowrap;
    }

    .factor-status[data-state="clean"] {
      border-color: rgba(94, 200, 120, 0.45);
      color: #8fd4a4;
    }

    .factor-status[data-state="warning"] {
      border-color: rgba(230, 190, 80, 0.55);
      color: #e6c060;
    }

    .factor-status[data-state="invalid"] {
      border-color: rgba(230, 100, 100, 0.55);
      color: #e07070;
    }

    .factor-survivor {
      margin: 0.1rem 0 0;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    .factor-survivor strong {
      font-weight: 400;
      color: var(--text);
    }

    .mode-hidden {
      display: none !important;
    }

    .stepper {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 0.4rem;
      align-items: center;
    }

    .stepper-button {
      min-width: 28px;
      padding: 4px 8px;
    }

    .stepper .control-input {
      text-align: center;
      padding-left: 8px;
      padding-right: 8px;
      cursor: text;
    }

    .summary-block {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .summary-block strong {
      color: var(--text);
      font-weight: 400;
    }

    .summary-block code {
      font-size: 11px;
      color: var(--viz-text);
    }

    .control input:not([type="checkbox"]):not([type="radio"]),
    .control select,
    .control textarea,
    button {
      min-height: 28px;
      background: none;
      border: 1px solid var(--line-strong);
      color: var(--control-text);
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      transition: border-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    .control input:not([type="checkbox"]):not([type="radio"]):hover,
    .control select:hover,
    .control textarea:hover,
    button:hover {
      border-color: var(--control-text-hover);
      color: var(--control-text-hover);
    }

    button:disabled,
    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: var(--line);
      color: var(--muted);
    }

    .control input[type="number"]::-webkit-outer-spin-button,
    .control input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .control input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .control input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 16px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .control input[type="range"]::-webkit-slider-runnable-track {
      height: 1px;
      background: var(--line-strong);
    }

    .control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 4px;
      height: 14px;
      margin-top: -6.5px;
      border: 1px solid var(--line-strong);
      border-radius: 0;
      background: var(--control-text);
    }

    .control input[type="range"]::-moz-range-track {
      height: 1px;
      background: var(--line-strong);
      border: 0;
    }

    .control input[type="range"]::-moz-range-thumb {
      width: 4px;
      height: 14px;
      border: 1px solid var(--line-strong);
      border-radius: 0;
      background: var(--control-text);
    }

    .control input[type="range"]:hover::-webkit-slider-runnable-track,
    .control input[type="range"]:focus-visible::-webkit-slider-runnable-track,
    .control input[type="range"]:hover::-moz-range-track,
    .control input[type="range"]:focus-visible::-moz-range-track {
      background: var(--control-text-hover);
    }

    .control input[type="range"]:hover::-webkit-slider-thumb,
    .control input[type="range"]:focus-visible::-webkit-slider-thumb,
    .control input[type="range"]:hover::-moz-range-thumb,
    .control input[type="range"]:focus-visible::-moz-range-thumb {
      border-color: var(--control-text-hover);
      background: var(--control-text-hover);
    }

    .visualization-box {
      min-height: 320px;
      border: 1px dashed var(--viz-frame);
      background: var(--viz-bg);
      color: var(--viz-text);
      padding: var(--space-2);
      font-size: 12px;
    }

    .viz-mount {
      width: 100%;
      min-height: 300px;
      display: block;
    }

    .viz-mount canvas {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
    }

    @media (max-width: 900px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .ta-site-nav {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .ta-site-project-shell {
        min-height: calc(100vh - var(--ta-site-header-height-stacked));
      }

      .page-shell {
        padding: var(--space-3) 0;
        gap: var(--space-3);
      }

      .content-grid {
        gap: var(--space-3);
      }

      .visualization-box {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <header class="ta-site-header" data-project-header data-root="../../" aria-label="Site header">
    <div class="ta-site-nav">
      <a class="ta-site-brand" data-project-header-link="home" href="../../">Tyeler Ahern</a>
      <nav class="ta-site-links" aria-label="Site navigation">
        <a class="ta-site-link" data-project-header-link="home" href="../../">Home</a>
        <a class="ta-site-link" data-project-header-link="projects" href="../../#projects">Projects</a>
        <a class="ta-site-link" href="https://github.com/Tye-ler" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="ta-site-project-shell">
    <div class="page-shell">
      <div class="page-topbar">
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cycle theme mode" title="Cycle theme mode">theme: auto</button>
      </div>

      <section class="hero" aria-labelledby="project-title">
        <h1 id="project-title">Prime Explorer</h1>
        <p>
          Plot integers 1…N on a Cartesian canvas using a polar or square spiral. Highlight primes, filter composites by prime factors, and read the active equations live.
        </p>
      </section>

      <div class="content-grid">
        <aside class="section" aria-labelledby="controls-title">
          <h2 id="controls-title">controls</h2>
          <div class="surface">
            <div class="control-stack">
              <div class="control">
                <label for="plot-mode">plot mode</label>
                <select id="plot-mode">
                  <option value="polar">polar spiral</option>
                  <option value="square">square spiral</option>
                </select>
              </div>

              <div class="control">
                <label for="visibility-mode">display / visibility</label>
                <select id="visibility-mode">
                  <option value="all">show all</option>
                  <option value="composites">show only composites</option>
                  <option value="primes">show only primes</option>
                </select>
              </div>

              <div class="control factor-row">
                <label for="factor-input">prime factor filter (composites)</label>
                <div class="factor-input-wrap">
                  <input id="factor-input" type="text" placeholder="e.g. 2, 3, 5" autocomplete="off" spellcheck="false" />
                  <span id="factor-status" class="factor-status" data-state="clean" title="Factor parse status">ok</span>
                </div>
                <p class="factor-survivor" aria-live="polite">
                  <strong>Smallest surviving composite:</strong>
                  <span id="surviving-composite-out">—</span>
                </p>
              </div>

              <div class="control">
                <label for="max-n">max integer N (1…<span id="max-n-cap-label">10000</span>)</label>
                <div class="stepper" data-stepper>
                  <button type="button" class="stepper-button" data-step="-1" aria-label="decrease N">-</button>
                  <input id="max-n" class="control-input" type="number" min="1" max="10000" step="1" value="400" inputmode="numeric" />
                  <button type="button" class="stepper-button" data-step="1" aria-label="increase N">+</button>
                </div>
              </div>

              <div class="control">
                <label for="point-size">point size</label>
                <input id="point-size" type="range" min="1" max="8" step="0.5" value="2.5" />
              </div>

              <div class="control">
                <label>
                  <input id="show-grid" type="checkbox" checked />
                  show grid
                </label>
              </div>

              <div id="polar-controls" class="control-stack">
                <div class="control">
                  <label for="polar-m">m (Δθ = 2π / m)</label>
                  <div class="stepper" data-stepper>
                    <button type="button" class="stepper-button" data-step="-1" aria-label="decrease m">-</button>
                    <input id="polar-m" class="control-input" type="number" min="1" max="360" step="1" value="12" inputmode="numeric" />
                    <button type="button" class="stepper-button" data-step="1" aria-label="increase m">+</button>
                  </div>
                </div>
                <div class="control">
                  <label for="polar-a">radius scale a</label>
                  <input id="polar-a" type="range" min="0.05" max="3" step="0.01" value="0.35" />
                </div>
                <div class="control">
                  <label for="radius-preset">radius preset</label>
                  <select id="radius-preset">
                    <option value="sqrt">r_n = a√n</option>
                    <option value="linear">r_n = an</option>
                    <option value="log">r_n = a log(n + 1)</option>
                  </select>
                </div>
                <div class="control">
                  <label>
                    <input id="show-spiral-guide" type="checkbox" checked />
                    show spiral guide
                  </label>
                </div>
              </div>

              <div id="square-controls" class="control-stack mode-hidden">
                <div class="control">
                  <label for="cell-spacing">cell spacing / scale</label>
                  <input id="cell-spacing" type="range" min="0.2" max="2" step="0.02" value="1" />
                </div>
              </div>
            </div>
          </div>
        </aside>

        <section class="section" aria-labelledby="visualization-title">
          <h2 id="visualization-title">canvas</h2>
          <div class="surface">
            <div class="visualization-box">
              <div id="viz-mount" class="viz-mount" aria-label="prime distribution plot"></div>
            </div>
          </div>
        </section>
      </div>

      <section class="section" aria-labelledby="equation-title">
        <h2 id="equation-title">equation summary</h2>
        <div class="surface">
          <p id="equation-summary" class="summary-block"></p>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const rootElement = document.documentElement;
      const themeToggle = document.querySelector("#theme-toggle");
      const mediaQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      let themeMode = "auto";

      const N_MAX = 10000;
      const FIT_PADDING = 28;

      initializeTheme();
      initializeHeaderLinks();
      initializeSteppers();
      initializePlayground();

      function initializeTheme() {
        themeMode = "auto";
        applyTheme(themeMode);
        updateThemeToggleLabel();

        if (themeToggle) {
          themeToggle.addEventListener("click", cycleThemeMode);
        }

        if (mediaQuery) {
          const handleChange = () => {
            if (themeMode === "auto") {
              applyTheme("auto");
              updateThemeToggleLabel();
              if (window.mathExplorer && typeof window.mathExplorer.rerender === "function") {
                window.mathExplorer.rerender();
              }
            }
          };

          if (typeof mediaQuery.addEventListener === "function") {
            mediaQuery.addEventListener("change", handleChange);
          } else if (typeof mediaQuery.addListener === "function") {
            mediaQuery.addListener(handleChange);
          }
        }
      }

      function applyTheme(mode) {
        rootElement.setAttribute("data-theme", resolveTheme(mode));
      }

      function cycleThemeMode() {
        if (themeMode === "auto") {
          themeMode = resolveTheme("auto") === "dark" ? "light" : "dark";
        } else if (themeMode === "light") {
          themeMode = "dark";
        } else {
          themeMode = "auto";
        }

        applyTheme(themeMode);
        updateThemeToggleLabel();
        if (window.mathExplorer && typeof window.mathExplorer.rerender === "function") {
          window.mathExplorer.rerender();
        }
      }

      function updateThemeToggleLabel() {
        if (!themeToggle) return;
        themeToggle.textContent = `theme: ${themeMode}`;
      }

      function resolveTheme(mode) {
        if (mode === "auto") {
          return mediaQuery && mediaQuery.matches ? "dark" : "light";
        }
        return mode;
      }

      function initializeSteppers() {
        document.querySelectorAll("[data-stepper]").forEach((stepper) => {
          const input = stepper.querySelector('input[type="number"]');
          if (!input) return;

          stepper.querySelectorAll("[data-step]").forEach((button) => {
            button.addEventListener("click", () => {
              const amount = Number(button.getAttribute("data-step") || 0);
              if (!amount) return;

              const step = Number(input.step) || 1;
              const min = input.min === "" ? -Infinity : Number(input.min);
              const max = input.max === "" ? Infinity : Number(input.max);
              const current = input.value === "" ? 0 : Number(input.value);
              const next = clamp(current + amount * step, min, max);

              input.value = String(next);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
            });
          });
        });
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function initializeHeaderLinks() {
        const header = document.querySelector("[data-project-header]");
        if (!header) return;

        const root = normalizeRoot(header.getAttribute("data-root") || "./");

        const linkTargets = {
          home: root,
          projects: `${root}#projects`,
        };

        header.querySelectorAll("[data-project-header-link]").forEach((link) => {
          const key = link.getAttribute("data-project-header-link");
          if (linkTargets[key]) {
            link.setAttribute("href", linkTargets[key]);
          }
        });

        header.querySelectorAll(".ta-site-link").forEach((link) => {
          const url = new URL(link.getAttribute("href"), window.location.href);
          const samePath = stripIndex(url.pathname) === stripIndex(window.location.pathname);
          const sameHash = url.hash ? url.hash === window.location.hash : !window.location.hash;

          if (samePath && sameHash) {
            link.setAttribute("aria-current", "page");
          } else {
            link.removeAttribute("aria-current");
          }
        });
      }

      function normalizeRoot(value) {
        if (!value || value === ".") return "./";
        return /[#/]$/.test(value) ? value : `${value}/`;
      }

      function stripIndex(pathname) {
        return pathname.replace(/\/index\.html$/i, "/");
      }

      function initializePlayground() {
        const els = {
          plotMode: document.getElementById("plot-mode"),
          visibilityMode: document.getElementById("visibility-mode"),
          factorInput: document.getElementById("factor-input"),
          factorStatus: document.getElementById("factor-status"),
          survivingCompositeOut: document.getElementById("surviving-composite-out"),
          maxN: document.getElementById("max-n"),
          maxNCapLabel: document.getElementById("max-n-cap-label"),
          pointSize: document.getElementById("point-size"),
          showGrid: document.getElementById("show-grid"),
          polarControls: document.getElementById("polar-controls"),
          squareControls: document.getElementById("square-controls"),
          polarM: document.getElementById("polar-m"),
          polarA: document.getElementById("polar-a"),
          radiusPreset: document.getElementById("radius-preset"),
          showSpiralGuide: document.getElementById("show-spiral-guide"),
          cellSpacing: document.getElementById("cell-spacing"),
          vizMount: document.getElementById("viz-mount"),
          equationSummary: document.getElementById("equation-summary"),
        };

        const ZOOM_MIN = 0.25;
        const ZOOM_MAX = 8;
        let viewZoom = 1;

        if (els.maxNCapLabel) {
          els.maxNCapLabel.textContent = String(N_MAX);
        }
        if (els.maxN) {
          els.maxN.max = String(N_MAX);
        }

        let canvas = null;
        let ctx = null;

        function ensureCanvas() {
          if (!els.vizMount) return;
          if (!canvas) {
            canvas = document.createElement("canvas");
            canvas.setAttribute("role", "img");
            canvas.setAttribute("aria-label", "Integer plot");
            els.vizMount.innerHTML = "";
            els.vizMount.appendChild(canvas);
            ctx = canvas.getContext("2d");
            canvas.addEventListener(
              "wheel",
              (e) => {
                e.preventDefault();
                const factor = Math.exp(-e.deltaY * 0.0015);
                viewZoom = clamp(viewZoom * factor, ZOOM_MIN, ZOOM_MAX);
                renderAll();
              },
              { passive: false }
            );
          }
        }

        function readCssColor(prop, fallback) {
          try {
            const v = getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
            return v || fallback;
          } catch {
            return fallback;
          }
        }

        function bind() {
          const rerender = () => renderAll();
          [
            els.plotMode,
            els.visibilityMode,
            els.factorInput,
            els.maxN,
            els.pointSize,
            els.showGrid,
            els.polarM,
            els.polarA,
            els.radiusPreset,
            els.showSpiralGuide,
            els.cellSpacing,
          ].forEach((el) => {
            if (el) {
              el.addEventListener("input", rerender);
              el.addEventListener("change", rerender);
            }
          });

          if (els.plotMode) {
            els.plotMode.addEventListener("change", () => {
              syncModePanels();
              renderAll();
            });
          }

          syncModePanels();
        }

        function syncModePanels() {
          const polar = els.plotMode && els.plotMode.value === "polar";
          if (els.polarControls) {
            els.polarControls.classList.toggle("mode-hidden", !polar);
          }
          if (els.squareControls) {
            els.squareControls.classList.toggle("mode-hidden", polar);
          }
        }

        function sievePrimes(limit) {
          const isPrime = new Array(Math.max(2, limit + 1)).fill(true);
          isPrime[0] = false;
          isPrime[1] = false;
          const max = Math.floor(Math.sqrt(limit));
          for (let p = 2; p <= max; p++) {
            if (!isPrime[p]) continue;
            for (let m = p * p; m <= limit; m += p) {
              isPrime[m] = false;
            }
          }
          return isPrime;
        }

        function classify(n, isPrimeArr) {
          if (n === 1) return "neither";
          return isPrimeArr[n] ? "prime" : "composite";
        }

        function parseFactorInput(raw) {
          const trimmed = String(raw || "").trim();
          if (trimmed === "") {
            return { state: "clean", invalid: false, effective: new Set(), warnings: [] };
          }

          const parts = trimmed.split(",");
          const values = [];
          let invalid = false;

          for (let i = 0; i < parts.length; i++) {
            const token = parts[i].replace(/\s+/g, "");
            if (token === "") {
              invalid = true;
              break;
            }
            if (!/^-?\d+$/.test(token)) {
              invalid = true;
              break;
            }
            const v = Number(token);
            if (!Number.isFinite(v)) {
              invalid = true;
              break;
            }
            values.push(v);
          }

          if (invalid) {
            return { state: "invalid", invalid: true, effective: new Set(), warnings: [] };
          }

          const effective = new Set();
          const warnings = [];
          for (const v of values) {
            if (v === 1) {
              warnings.push(1);
              continue;
            }
            if (v < 2 || !Number.isInteger(v)) {
              warnings.push(v);
              continue;
            }
            if (!isPrimeTrial(v)) {
              warnings.push(v);
              continue;
            }
            effective.add(v);
          }

          const state = warnings.length ? "warning" : "clean";
          return { state, invalid: false, effective, warnings };
        }

        function isPrimeTrial(n) {
          if (n < 2) return false;
          if (n === 2) return true;
          if (n % 2 === 0) return false;
          const r = Math.floor(Math.sqrt(n));
          for (let d = 3; d <= r; d += 2) {
            if (n % d === 0) return false;
          }
          return true;
        }

        /** Classic square spiral: 1→(0,0), 2→(1,0), 3→(1,1), 4→(0,1), 5→(-1,1), 6→(-1,0), … */
        function squareSpiralLattice(n) {
          if (n === 1) return { x: 0, y: 0 };
          const dx = [1, 0, -1, 0];
          const dy = [0, 1, 0, -1];
          let x = 0;
          let y = 0;
          let k = 2;
          let len = 1;
          let dir = 0;
          for (;;) {
            for (let side = 0; side < 2; side++) {
              for (let s = 0; s < len; s++) {
                x += dx[dir];
                y += dy[dir];
                if (k === n) return { x, y };
                k++;
              }
              dir = (dir + 1) % 4;
            }
            len++;
          }
        }

        function polarRtilde(n, preset) {
          if (preset === "sqrt") return Math.sqrt(n);
          if (preset === "linear") return n;
          return Math.log(n + 1);
        }

        function polarXY(n, m, a, preset) {
          const dTheta = (2 * Math.PI) / m;
          const theta = n * dTheta;
          const rTilde = polarRtilde(n, preset);
          const r = a * rTilde;
          return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
        }

        function radiusLabel(preset) {
          if (preset === "sqrt") return "r_n = a√n";
          if (preset === "linear") return "r_n = an";
          return "r_n = a log(n + 1) (natural log)";
        }

        function shouldShowInteger(n, kind, visibility, factorResult, useFilter) {
          if (visibility === "primes" && kind !== "prime") return false;
          if (visibility === "composites" && kind !== "composite") return false;
          if (kind !== "composite") return true;
          if (!useFilter) return true;
          for (const p of factorResult.effective) {
            if (p !== 0 && n % p === 0) {
              return false;
            }
          }
          return true;
        }

        /** Smallest composite in [1..N] not divisible by any active filter prime; uses factorResult.effective (empty if invalid input). Ignores visibility. */
        function smallestSurvivingComposite(N, factorResult, isPrimeArr) {
          const active = factorResult.effective;
          for (let n = 4; n <= N; n++) {
            if (classify(n, isPrimeArr) !== "composite") continue;
            let blocked = false;
            for (const p of active) {
              if (p !== 0 && n % p === 0) {
                blocked = true;
                break;
              }
            }
            if (!blocked) return n;
          }
          return null;
        }

        function renderAll() {
          ensureCanvas();
          if (!canvas || !ctx || !els.equationSummary) return;

          const N = clamp(Math.floor(Number(els.maxN && els.maxN.value) || 1), 1, N_MAX);
          if (els.maxN && String(els.maxN.value) !== String(N)) {
            els.maxN.value = String(N);
          }

          const plotMode = els.plotMode ? els.plotMode.value : "polar";
          const visibility = els.visibilityMode ? els.visibilityMode.value : "all";
          const pointRadius = clamp(Number(els.pointSize && els.pointSize.value) || 2, 0.5, 20);
          const showGrid = els.showGrid && els.showGrid.checked;
          const m = clamp(Math.floor(Number(els.polarM && els.polarM.value) || 1), 1, 360);
          const a = clamp(Number(els.polarA && els.polarA.value) || 0.1, 0.01, 100);
          const preset = els.radiusPreset ? els.radiusPreset.value : "sqrt";
          const cell = clamp(Number(els.cellSpacing && els.cellSpacing.value) || 1, 0.05, 50);

          if (els.polarM) {
            els.polarM.value = String(m);
          }

          const factorResult = parseFactorInput(els.factorInput ? els.factorInput.value : "");
          const useFilter = !factorResult.invalid;

          if (els.factorStatus) {
            els.factorStatus.dataset.state = factorResult.invalid ? "invalid" : factorResult.state;
            if (factorResult.invalid) {
              els.factorStatus.textContent = "invalid";
              els.factorStatus.title = "Malformed input — factor filtering disabled";
            } else if (factorResult.state === "warning") {
              els.factorStatus.textContent = "warn";
              els.factorStatus.title = "Non-prime entries ignored: " + factorResult.warnings.join(", ");
            } else {
              els.factorStatus.textContent = "ok";
              els.factorStatus.title = "All entries prime (or empty)";
            }
          }

          const isPrimeArr = sievePrimes(N);

          if (els.survivingCompositeOut) {
            const survivor = smallestSurvivingComposite(N, factorResult, isPrimeArr);
            els.survivingCompositeOut.textContent =
              survivor === null
                ? "No surviving composite within current range"
                : String(survivor);
          }

          const points = [];
          for (let n = 1; n <= N; n++) {
            const kind = classify(n, isPrimeArr);
            if (!shouldShowInteger(n, kind, visibility, factorResult, useFilter)) continue;

            let wx;
            let wy;
            if (plotMode === "square") {
              const p = squareSpiralLattice(n);
              wx = p.x * cell;
              wy = p.y * cell;
            } else {
              const p = polarXY(n, m, a, preset);
              wx = p.x;
              wy = p.y;
            }
            points.push({ n, kind, x: wx, y: wy });
          }

          const dpr = window.devicePixelRatio || 1;
          const rect = els.vizMount.getBoundingClientRect();
          const cssW = Math.max(200, Math.floor(rect.width));
          const cssH = Math.max(240, Math.floor(rect.width * 0.62));

          canvas.style.width = `${cssW}px`;
          canvas.style.height = `${cssH}px`;
          canvas.width = Math.floor(cssW * dpr);
          canvas.height = Math.floor(cssH * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const w = cssW;
          const h = cssH;

          const primeColor = readCssColor("--prime-color", "#7ee787");
          const neutralColor = readCssColor("--neutral-point", "#9ca3af");
          const spiralGuideColor = readCssColor("--spiral-guide", "rgba(95, 143, 232, 0.35)");
          const bg = readCssColor("--viz-bg", "#1f1f1f");
          const gridColor = readCssColor("--viz-grid", "rgba(255,255,255,0.08)");
          const axisColor = readCssColor("--viz-axis", "rgba(255,255,255,0.24)");

          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, w, h);

          const innerW = Math.max(1, w - FIT_PADDING * 2);
          const innerH = Math.max(1, h - FIT_PADDING * 2);
          const cx = w / 2;
          const cy = h / 2;

          let worldHalfW = 1e-6;
          let worldHalfH = 1e-6;
          let scale = 1;

          if (plotMode === "polar") {
            const rTildeMax = Math.max(polarRtilde(N, preset), 1e-9);
            worldHalfW = a * rTildeMax;
            worldHalfH = a * rTildeMax;
            const baseScale = Math.min(innerW / (2 * rTildeMax), innerH / (2 * rTildeMax));
            scale = baseScale * viewZoom;
          } else {
            let minX = 0;
            let maxX = 0;
            let minY = 0;
            let maxY = 0;
            for (const p of points) {
              minX = Math.min(minX, p.x);
              maxX = Math.max(maxX, p.x);
              minY = Math.min(minY, p.y);
              maxY = Math.max(maxY, p.y);
            }
            const halfSpanX = Math.max(Math.abs(minX), Math.abs(maxX), 1e-6);
            const halfSpanY = Math.max(Math.abs(minY), Math.abs(maxY), 1e-6);
            worldHalfW = Math.max(halfSpanX, 1e-9);
            worldHalfH = Math.max(halfSpanY, 1e-9);
            const baseScale = Math.min(innerW / (2 * worldHalfW), innerH / (2 * worldHalfH));
            scale = baseScale * viewZoom;
          }

          function worldToCanvas(x, y) {
            return {
              x: cx + x * scale,
              y: cy - y * scale,
            };
          }

          if (showGrid) {
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            const stepWorld = niceStep((2 * Math.max(worldHalfW, worldHalfH)) / 10);
            const x0 = -worldHalfW;
            const x1 = worldHalfW;
            const y0 = -worldHalfH;
            const y1 = worldHalfH;
            for (let xw = Math.floor(x0 / stepWorld) * stepWorld; xw <= x1; xw += stepWorld) {
              const p1 = worldToCanvas(xw, y0);
              const p2 = worldToCanvas(xw, y1);
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.stroke();
            }
            for (let yw = Math.floor(y0 / stepWorld) * stepWorld; yw <= y1; yw += stepWorld) {
              const p1 = worldToCanvas(x0, yw);
              const p2 = worldToCanvas(x1, yw);
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.stroke();
            }
          }

          ctx.strokeStyle = axisColor;
          ctx.lineWidth = 1.25;
          const o1 = worldToCanvas(-worldHalfW, 0);
          const o2 = worldToCanvas(worldHalfW, 0);
          ctx.beginPath();
          ctx.moveTo(o1.x, o1.y);
          ctx.lineTo(o2.x, o2.y);
          ctx.stroke();
          const v1 = worldToCanvas(0, -worldHalfH);
          const v2 = worldToCanvas(0, worldHalfH);
          ctx.beginPath();
          ctx.moveTo(v1.x, v1.y);
          ctx.lineTo(v2.x, v2.y);
          ctx.stroke();

          if (plotMode === "polar" && els.showSpiralGuide && els.showSpiralGuide.checked && N >= 2) {
            ctx.strokeStyle = spiralGuideColor;
            ctx.lineWidth = 1.25;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.beginPath();
            let started = false;
            for (let n = 1; n <= N; n++) {
              const q = polarXY(n, m, a, preset);
              const c = worldToCanvas(q.x, q.y);
              if (!started) {
                ctx.moveTo(c.x, c.y);
                started = true;
              } else {
                ctx.lineTo(c.x, c.y);
              }
            }
            ctx.stroke();
          }

          for (const p of points) {
            const c = worldToCanvas(p.x, p.y);
            const fill = p.kind === "prime" ? primeColor : neutralColor;
            ctx.fillStyle = fill;
            ctx.beginPath();
            ctx.arc(c.x, c.y, pointRadius, 0, Math.PI * 2);
            ctx.fill();
          }

          const effList = Array.from(factorResult.effective).sort((a, b) => a - b);
          const filterNote = factorResult.invalid
            ? "factor filter: <strong>disabled</strong> (invalid syntax)"
            : effList.length
              ? `factor filter (composites): hide if divisible by { ${effList.join(", ")} }`
              : "factor filter: <em>none</em> (empty or no prime entries)";

          const visLabel =
            visibility === "all" ? "show all (subject to filter)" :
            visibility === "primes" ? "show only primes" :
            "show only composites";

          if (plotMode === "polar") {
            const dThetaStr = (2 * Math.PI / m).toFixed(6);
            els.equationSummary.innerHTML = `
              <strong>Polar spiral.</strong> Δθ = 2π / m ≈ ${dThetaStr} rad; θ_n = n · Δθ.
              Active radius: <code>${radiusLabel(preset)}</code> with a = ${a.toFixed(4)}, m = ${m}.
              <br />
              Cartesian: x_n = r_n cos(θ_n), y_n = r_n sin(θ_n).
              <br />
              <strong>Display:</strong> ${visLabel}. ${filterNote}.
            `;
          } else {
            els.equationSummary.innerHTML = `
              <strong>Square spiral.</strong> Integer n maps to lattice steps from the center; world position scales by cell spacing s = ${cell.toFixed(3)}:
              (x, y)_world = s · (x, y)_lattice.
              <br />
              <strong>Display:</strong> ${visLabel}. ${filterNote}.
            `;
          }

          window.mathExplorer = window.mathExplorer || {};
          window.mathExplorer.getSnapshot = () => ({
            N,
            plotMode,
            visibility,
            points: points.length,
            factor: factorResult,
          });
          window.mathExplorer.rerender = renderAll;
        }

        function niceStep(span) {
          const exp = Math.floor(Math.log10(span));
          const base = Math.pow(10, exp);
          const frac = span / base;
          let nice;
          if (frac < 1.5) nice = 1;
          else if (frac < 3.5) nice = 2;
          else if (frac < 7.5) nice = 5;
          else nice = 10;
          return nice * base;
        }

        bind();
        renderAll();

        let resizeTimer = null;
        window.addEventListener("resize", () => {
          if (resizeTimer) clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => renderAll(), 80);
        });
      }
    })();
  </script>
</body>
</html>
